framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    http_method_override: false
    handle_all_throwables: true

    php_errors:
        log: true

    # Cache configuration
    cache:
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'
        system: cache.adapter.apcu

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    # Rate limiting (CORREGIDO: se añade 'int:' para forzar número entero)
    rate_limiter:
        login:
            policy: 'fixed_window'
            limit: '%env(int:RATE_LIMIT_LOGIN)%'
            interval: '15 minutes' # Asegúrate de tener un intervalo definido
        ubicacion:
            policy: 'fixed_window'
            limit: '%env(int:RATE_LIMIT_UBICACION)%'
            interval: '1 minute' # Asegúrate de tener un intervalo definido

    # Workflow para estados de envío
    workflows:
        envio:
            type: 'state_machine'
            marking_store:
                type: 'method'
                property: 'marking'
            supports:
                - App\Envio\Entity\Envio
            initial_marking: pendiente
            places:
                - pendiente
                - pagado
                - asignado
                - recogido
                - en_camino
                - entregado
                - cancelado
            transitions:
                pagar:
                    from: pendiente
                    to: pagado
                asignar:
                    from: pagado
                    to: asignado
                recoger:
                    from: asignado
                    to: recogido
                iniciar_entrega:
                    from: recogido
                    to: en_camino
                entregar:
                    from: en_camino
                    to: entregado
                cancelar:
                    from: [pendiente, pagado, asignado, recogido, en_camino]
                    to: cancelado

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file